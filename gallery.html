<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🖼 Gallery | My Melody</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { background: #fdf2f8; }

    .photo-wall {
      columns: 2 160px; column-gap: 10px;
      padding: 16px 14px 48px;
      max-width: 900px; margin: 0 auto;
    }

    .photo-card {
      break-inside: avoid; margin-bottom: 10px;
      background: #fff; border-radius: 4px;
      padding: 7px 7px 30px;
      box-shadow: 0 4px 18px rgba(100,30,60,0.13), 0 1px 3px rgba(100,30,60,0.08);
      position: relative; cursor: pointer;
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
      animation: fadeInUp 0.4s ease both;
    }
    .photo-card:hover {
      transform: scale(1.04) rotate(-0.3deg);
      box-shadow: 0 18px 44px rgba(219,39,119,0.22);
      z-index: 5;
    }
    .photo-card:nth-child(3n)   { transform: rotate(0.8deg); }
    .photo-card:nth-child(3n):hover { transform: scale(1.04) rotate(0deg); }
    .photo-card:nth-child(3n+1) { transform: rotate(-0.6deg); }
    .photo-card:nth-child(3n+1):hover { transform: scale(1.04) rotate(0deg); }

    .photo-img {
      width: 100%; display: block;
      border-radius: 2px; object-fit: cover;
    }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(20,4,12,0.92); backdrop-filter: blur(14px);
      z-index: 1000; align-items: center; justify-content: center; padding: 20px;
    }
    .lightbox.open { display: flex; }
    .lb-img {
      max-width: min(94vw, 800px); max-height: 90vh;
      object-fit: contain; border-radius: 6px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: bounce-in 0.3s ease;
    }
    .lb-close {
      position: absolute; top: 14px; right: 18px;
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      font-size: 1.6rem; cursor: pointer; border-radius: 50%;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .lb-close:hover { background: rgba(219,39,119,0.6); }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      font-size: 2rem; cursor: pointer; border-radius: 50%;
      width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .lb-nav:hover { background: rgba(244,114,182,0.5); }
    .lb-prev { left: 12px; } .lb-next { right: 12px; }

    @media (max-width: 480px) {
      .photo-wall { columns: 2 110px; column-gap: 8px; padding: 10px; }
    }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <nav>
    <a href="index.html" class="logo">🎀 My Melody</a>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    <ul id="nav-links">
      <li><a href="letter.html">💌 จดหมาย</a></li>
      <li><a href="story.html">⏱ Timer</a></li>
      <li><a href="gallery.html">🖼 Gallery</a></li>
    </ul>
  </nav>

  <div class="page-wrapper">
    <!-- Hero -->
    <section style="padding:120px 24px 48px;text-align:center;background:radial-gradient(ellipse 80% 60% at 50% 55%,rgba(244,114,182,0.11) 0%,transparent 70%),var(--gradient-hero);" class="dot-bg">
      <p class="section-eyebrow">🖼 Gallery</p>
      <img src="images/melody_flowers.png" alt="My Melody" style="width:clamp(90px,16vw,150px);object-fit:contain;filter:drop-shadow(0 8px 24px rgba(219,39,119,0.22));animation:float 3.5s ease-in-out infinite;margin-bottom:8px;"/>
      <div style="font-family:'Dancing Script',cursive;font-size:clamp(2.5rem,6vw,4.5rem);color:var(--pink-deep);">Our Memories</div>
      <p style="margin-top:10px;color:var(--muted);font-size:0.92rem;">กดที่รูปเพื่อดูใหญ่ๆ ได้เลย 💕</p>
    </section>

    <!-- Photo wall -->
    <div class="photo-wall" id="photoWall">
      <!-- photos from photos/ folder — เพิ่มรูปใหม่ที่นี่ -->
      <div class="photo-card" onclick="openLight(0)"><img class="photo-img" src="photos/D5D99F82-21AE-4A0E-8DF8-DECDBDE94C55.jpg" loading="lazy"/></div>
      <div class="photo-card" onclick="openLight(1)"><img class="photo-img" src="photos/DSC00823.jpg" loading="lazy"/></div>
      <div class="photo-card" onclick="openLight(2)"><img class="photo-img" src="photos/DSC00828.jpg" loading="lazy"/></div>
      <div class="photo-card" onclick="openLight(3)"><img class="photo-img" src="photos/DSC01100.jpg" loading="lazy"/></div>
      <div class="photo-card" onclick="openLight(4)"><img class="photo-img" src="photos/DSC01110.jpg" loading="lazy"/></div>
      <div class="photo-card" onclick="openLight(5)"><img class="photo-img" src="photos/IMG_2296.jpg" loading="lazy"/></div>
      <div class="photo-card" onclick="openLight(6)"><img class="photo-img" src="photos/IMG_2298.jpg" loading="lazy"/></div>
      <div class="photo-card" onclick="openLight(7)"><img class="photo-img" src="photos/IMG_6092.jpg" loading="lazy"/></div>
      <div class="photo-card" onclick="openLight(8)"><img class="photo-img" src="photos/IMG_6335.jpg" loading="lazy"/></div>
      <div class="photo-card" onclick="openLight(9)"><img class="photo-img" src="photos/IMG_6341.jpg" loading="lazy"/></div>
    </div>

    <footer><p>🎀 Made with <span class="footer-heart">❤</span> just for you — 2026</p></footer>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="if(event.target.id==='lightbox')closeLight()">
    <button class="lb-close" onclick="closeLight()">✕</button>
    <button class="lb-nav lb-prev" onclick="navLight(-1)">‹</button>
    <img class="lb-img" id="lbImg" src="" alt=""/>
    <button class="lb-nav lb-next" onclick="navLight(1)">›</button>
  </div>

  <script src="animations.js"></script>
  <script>
    const imgs = Array.from(document.querySelectorAll('.photo-img'));
    let lbIdx = 0;

    function openLight(i) {
      lbIdx = i;
      document.getElementById('lbImg').src = imgs[i].src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLight() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    function navLight(d) {
      lbIdx = (lbIdx + d + imgs.length) % imgs.length;
      const el = document.getElementById('lbImg');
      el.style.opacity = '0';
      setTimeout(() => { el.src = imgs[lbIdx].src; el.style.opacity = '1'; }, 130);
    }
    document.addEventListener('keydown', e => {
      const lb = document.getElementById('lightbox');
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')    closeLight();
      if (e.key === 'ArrowLeft') navLight(-1);
      if (e.key === 'ArrowRight') navLight(1);
    });
  </script>
</body>
</html>
