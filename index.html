<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎀 Happy 1 Month Anniversary</title>
  <meta name="description" content="กดเปิดของขวัญ 🎁"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { overflow: hidden; }

    /* ── Full-screen gift stage ── */
    .gift-stage {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      position: relative; z-index: 1;
      background: radial-gradient(ellipse 90% 80% at 50% 60%, rgba(244,114,182,0.14) 0%, transparent 70%),
                  var(--gradient-hero);
    }

    /* floating decos */
    .f-deco {
      position: absolute; font-size: 1.5rem; opacity: 0.18;
      animation: float 4s ease-in-out infinite; pointer-events: none;
    }

    /* Intro text */
    .gift-eyebrow {
      font-size: 0.78rem; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--pink-deep); font-weight: 800; margin-bottom: 12px;
      animation: fadeInUp 0.6s ease both;
    }
    .gift-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.2rem, 6vw, 4rem); color: var(--pink-deep);
      text-shadow: 0 4px 20px rgba(219,39,119,0.15);
      animation: fadeInUp 0.6s 0.1s ease both;
    }
    .gift-sub {
      font-size: 0.95rem; color: var(--muted); margin-top: 8px; margin-bottom: 0;
      animation: fadeInUp 0.6s 0.2s ease both;
    }

    /* ── CSS Gift Box ── */
    .gift-box-wrap {
      position: relative; margin: 28px 0 20px;
      animation: fadeInUp 0.7s 0.3s ease both;
      cursor: pointer; display: inline-block;
    }
    .gift-box-wrap:hover .gift-box  { transform: scale(1.06); }
    .gift-box-wrap:hover .gift-lid  { transform: translateY(-14px) scale(1.06); }
    .gift-box-wrap.shake { animation: gift-shake 0.5s ease; }

    /* box body */
    .gift-box {
      width: clamp(160px, 32vw, 220px);
      height: clamp(120px, 24vw, 165px);
      background: linear-gradient(160deg, #f9a8d4 0%, #f472b6 60%, #db2777 100%);
      border-radius: 12px 12px 18px 18px;
      position: relative; margin: 0 auto;
      box-shadow: 0 16px 44px rgba(219,39,119,0.32), inset 0 2px 0 rgba(255,255,255,0.25);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    }
    /* vertical ribbon on box */
    .gift-box::before {
      content: '';
      position: absolute; left: 50%; transform: translateX(-50%);
      top: 0; bottom: 0; width: 22%;
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
    }
    /* horizontal ribbon on box */
    .gift-box::after {
      content: '';
      position: absolute; top: 50%; transform: translateY(-50%);
      left: 0; right: 0; height: 22%;
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
    }

    /* lid */
    .gift-lid {
      width: clamp(180px, 36vw, 248px);
      height: clamp(38px, 8vw, 52px);
      background: linear-gradient(160deg, #fbcfe8 0%, #f472b6 100%);
      border-radius: 12px;
      margin: 0 auto -4px;
      position: relative;
      box-shadow: 0 6px 20px rgba(219,39,119,0.22), inset 0 2px 0 rgba(255,255,255,0.3);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    }
    /* vertical ribbon on lid */
    .gift-lid::after {
      content: '';
      position: absolute; left: 50%; transform: translateX(-50%);
      top: 0; bottom: 0; width: 18%;
      background: rgba(255,255,255,0.35);
      border-radius: 4px;
    }

    /* bow */
    .gift-bow {
      position: absolute; top: -32px; left: 50%; transform: translateX(-50%);
      width: 72px; height: 36px; z-index: 2;
    }
    .bow-left, .bow-right {
      position: absolute;
      width: 32px; height: 26px;
      background: linear-gradient(135deg, #ffffff 0%, #fbcfe8 100%);
      border-radius: 50% 50% 4px 50%;
      box-shadow: 0 4px 10px rgba(219,39,119,0.25);
    }
    .bow-left  { left:0;  top:0; transform: rotate(-30deg); }
    .bow-right { right:0; top:0; transform: rotate(30deg) scaleX(-1); }
    .bow-knot {
      position: absolute; left: 50%; top: 4px; transform: translateX(-50%);
      width: 14px; height: 14px;
      background: #fbcfe8;
      border-radius: 50%;
      border: 2px solid rgba(219,39,119,0.3);
      z-index: 3;
    }

    /* sparkle dots around box */
    .box-sparkle {
      position: absolute; font-size: 1.1rem;
      animation: float 2.5s ease-in-out infinite; pointer-events:none;
    }

    @keyframes gift-shake {
      0%,100% { transform: rotate(0deg); }
      20%      { transform: rotate(-6deg) scale(1.05); }
      40%      { transform: rotate(6deg) scale(1.05); }
      60%      { transform: rotate(-4deg) scale(1.02); }
      80%      { transform: rotate(4deg) scale(1.02); }
    }

    .gift-tap-hint {
      font-size: 0.82rem; color: var(--pink-deep); font-weight: 700;
      animation: pulse-heart 1.8s ease-in-out infinite;
      margin-bottom: 0;
    }

    /* ── Password panel ── */
    .pw-panel {
      display: none;
      flex-direction: column; align-items: center; gap: 14px;
      animation: bounce-in 0.45s ease;
      width: 100%; max-width: 340px;
    }
    .pw-panel.show { display: flex; }

    .pw-label {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem; color: var(--pink-deep);
    }

    .pw-dots {
      display: flex; gap: 12px; margin: 4px 0;
    }
    .pw-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(244,114,182,0.25);
      border: 2px solid rgba(244,114,182,0.4);
      transition: all 0.25s;
    }
    .pw-dot.filled {
      background: var(--pink-deep);
      box-shadow: 0 0 8px rgba(219,39,119,0.45);
      border-color: var(--pink-deep);
    }

    /* number pad */
    .numpad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; width: 100%;
    }
    .num-btn {
      background: var(--white);
      border: 2px solid rgba(244,114,182,0.22);
      border-radius: 16px; padding: 16px 0;
      font-size: 1.3rem; font-weight: 800; font-family: 'Nunito', sans-serif;
      color: var(--dark); cursor: pointer;
      box-shadow: 0 4px 14px rgba(219,39,119,0.07);
      transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
      -webkit-tap-highlight-color: transparent;
    }
    .num-btn:active, .num-btn:hover {
      background: var(--pink-soft);
      border-color: var(--pink);
      transform: scale(0.93);
    }

    /* back & clear */
    .num-btn.back {
      background: rgba(244,114,182,0.1);
      color: var(--pink-deep); font-size: 1.1rem;
    }
    .num-btn.confirm {
      background: var(--gradient-btn);
      color: var(--white);
      box-shadow: var(--shadow-btn);
    }
    .num-btn.confirm:hover { filter: brightness(1.08); }

    /* wrong shake */
    .pw-panel.wrong { animation: gift-shake 0.45s ease; }

    .pw-error {
      font-size: 0.82rem; color: var(--pink-deep); font-weight: 700;
      opacity: 0; transition: opacity 0.3s;
    }
    .pw-error.show { opacity: 1; }

    /* success burst overlay */
    .success-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(253,242,248,0.0);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px;
      pointer-events: none;
      transition: background 0.5s;
    }
    .success-overlay.active {
      pointer-events: all;
      background: rgba(253,242,248,0.92);
      backdrop-filter: blur(16px);
    }
    .success-msg {
      font-family: 'Dancing Script', cursive;
      font-size: 3rem; color: var(--pink-deep); opacity: 0;
      transform: scale(0.7);
      transition: all 0.5s cubic-bezier(.34,1.56,.64,1);
    }
    .success-overlay.active .success-msg {
      opacity: 1; transform: scale(1);
    }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <!-- floating decos -->
  <div class="f-deco" style="left:5%;top:20%;animation-delay:0s">✨</div>
  <div class="f-deco" style="right:6%;top:18%;animation-delay:1s">🌸</div>
  <div class="f-deco" style="left:10%;top:72%;animation-delay:0.5s">♡</div>
  <div class="f-deco" style="right:8%;top:68%;animation-delay:1.5s">✿</div>
  <div class="f-deco" style="left:44%;top:8%;animation-delay:0.8s">⭐</div>

  <div class="gift-stage">

    <!-- Phase 1 : gift box -->
    <div id="phase-gift">
      <p class="gift-eyebrow">🎀 Happy 1 Month Anniversary 🎀</p>
      <div class="gift-title">มีของขวัญให้เธอ</div>
      <p class="gift-sub">กดที่กล่องเพื่อเปิด 💕</p>

      <div class="gift-box-wrap" id="giftImg" onclick="openGift()">
        <!-- sparkles -->
        <span class="box-sparkle" style="left:-18px;top:20px;animation-delay:0s">✨</span>
        <span class="box-sparkle" style="right:-18px;top:30px;animation-delay:0.8s">🌸</span>
        <span class="box-sparkle" style="left:-10px;bottom:10px;animation-delay:1.4s">⭐</span>
        <span class="box-sparkle" style="right:-10px;bottom:20px;animation-delay:0.4s">💗</span>
        <!-- lid with bow -->
        <div class="gift-lid" style="position:relative;">
          <div class="gift-bow">
            <div class="bow-left"></div>
            <div class="bow-right"></div>
            <div class="bow-knot"></div>
          </div>
        </div>
        <!-- box body -->
        <div class="gift-box"></div>
      </div>
      <p class="gift-tap-hint">👆 แตะที่กล่องเลย!</p>
    </div>

    <!-- Phase 2 : password -->
    <div class="pw-panel" id="pwPanel">
      <div class="pw-label">ใส่รหัสผ่านด้วยนะ 🔑</div>

      <div class="pw-dots" id="pwDots">
        <div class="pw-dot" id="d0"></div>
        <div class="pw-dot" id="d1"></div>
        <div class="pw-dot" id="d2"></div>
        <div class="pw-dot" id="d3"></div>
        <div class="pw-dot" id="d4"></div>
        <div class="pw-dot" id="d5"></div>
      </div>

      <p class="pw-error" id="pwError">รหัสไม่ถูกนะ ลองใหม่อีกครั้ง 🎀</p>

      <div class="numpad" id="numpad">
        <button class="num-btn" onclick="pressKey('1')">1</button>
        <button class="num-btn" onclick="pressKey('2')">2</button>
        <button class="num-btn" onclick="pressKey('3')">3</button>
        <button class="num-btn" onclick="pressKey('4')">4</button>
        <button class="num-btn" onclick="pressKey('5')">5</button>
        <button class="num-btn" onclick="pressKey('6')">6</button>
        <button class="num-btn" onclick="pressKey('7')">7</button>
        <button class="num-btn" onclick="pressKey('8')">8</button>
        <button class="num-btn" onclick="pressKey('9')">9</button>
        <button class="num-btn back" onclick="backspace()">⌫</button>
        <button class="num-btn" onclick="pressKey('0')">0</button>
        <button class="num-btn confirm" onclick="confirmCode()">✓</button>
      </div>
    </div>

  </div>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-msg">เปิดแล้ว! 💕</div>
    <div style="font-size:0.9rem;color:var(--muted);margin-top:6px;opacity:0;transition:opacity 0.8s 0.5s" id="successSub">กำลังพาไป...</div>
  </div>

  <script src="animations.js"></script>
  <script>
    // ── CHANGE PASSWORD HERE ──────────────────────
    const SECRET = '140226'; // ← เปลี่ยนรหัสตรงนี้!
    // ─────────────────────────────────────────────

    let input = '';
    const MAX = SECRET.length;

    function openGift() {
      const box = document.getElementById('giftImg');
      box.classList.add('shake');
      setTimeout(() => {
        box.classList.remove('shake');
        document.getElementById('phase-gift').style.display = 'none';
        document.getElementById('pwPanel').classList.add('show');
        document.body.style.overflow = '';
      }, 520);
    }

    function pressKey(k) {
      if (input.length >= MAX) return;
      input += k;
      updateDots();
      if (input.length === MAX) setTimeout(confirmCode, 280);
    }

    function backspace() {
      input = input.slice(0, -1);
      clearError();
      updateDots();
    }

    function updateDots() {
      for (let i = 0; i < MAX; i++) {
        document.getElementById('d' + i).classList.toggle('filled', i < input.length);
      }
    }

    function clearError() {
      document.getElementById('pwError').classList.remove('show');
    }

    function confirmCode() {
      if (input === SECRET) {
        // success!
        const ov = document.getElementById('successOverlay');
        ov.classList.add('active');
        setTimeout(() => { document.getElementById('successSub').style.opacity = '1'; }, 100);
        // launch sparkles
        for (let i = 0; i < 22; i++) {
          setTimeout(() => launchRandom(), i * 60);
        }
        setTimeout(() => { window.location.href = 'letter.html'; }, 2200);
      } else {
        // wrong
        input = '';
        updateDots();
        document.getElementById('pwError').classList.add('show');
        const panel = document.getElementById('pwPanel');
        panel.classList.add('wrong');
        setTimeout(() => panel.classList.remove('wrong'), 480);
      }
    }

    function launchRandom() {
      const colors = ['#f472b6','#db2777','#f9a8d4','#e879f9','#fbbf24','#fb7185'];
      const spark = document.createElement('span');
      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      spark.style.cssText = `
        position:fixed; left:${x}px; top:${y}px;
        width:8px; height:8px; border-radius:50%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        pointer-events:none; z-index:9999;
        animation: spark-out 0.9s ease forwards;
        --dx:${(Math.random()-0.5)*100}px;
        --dy:${(Math.random()-0.5)*100}px;
      `;
      document.body.appendChild(spark);
      setTimeout(() => spark.remove(), 950);
    }

    // keyboard support
    document.addEventListener('keydown', e => {
      if (/^\d$/.test(e.key)) pressKey(e.key);
      else if (e.key === 'Backspace') backspace();
      else if (e.key === 'Enter') confirmCode();
    });
  </script>
</body>
</html>
